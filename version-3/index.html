<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Cirrus Fleet — operational registry dashboard with live ADS-B traffic, METAR weather, and owner-base mapping." />
<title>Cirrus Fleet · Operational Registry</title>

<!-- Leaflet CSS (pinned, official SRI) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

<!-- Dashboard styles -->
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Splash shown until React mounts (brief — v3 ships precompiled JS, no in-browser Babel) -->
<div id="splash" class="cirrus-splash">
  <div>INITIALIZING FLEET REGISTRY</div>
  <div class="cirrus-splash__bar"></div>
</div>

<div id="root"></div>

<!--
  Dependencies — all pinned to exact versions.
  v3 removes @babel/standalone entirely: app.js is plain precompiled JS.
  To add SRI integrity hashes for the remaining deps, run for each URL:
    curl -s <url> | openssl dgst -sha384 -binary | openssl base64 -A
  and add integrity="sha384-<hash>" to the tag.
-->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- Dashboard (precompiled — no JSX, no Babel) -->
<script src="app.js" defer></script>

</body>
</html>
